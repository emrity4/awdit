<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Awdit</title>
<style>
@font-face{font-family:'Work Sans';font-style:normal;font-weight:400 700;font-display:swap;src:url(fonts/WorkSans.woff2)format('woff2')}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Work Sans',-apple-system,BlinkMacSystemFont,sans-serif}
:root{--bg:#eee;--card:#fff;--text:#000;--text2:#555;--border:#ddd;--inc:#0d904f;--exp:#d93025}
@media(prefers-color-scheme:dark){
:root{--bg:#111;--card:#1a1a2e;--text:#eee;--text2:#999;--border:#333;--inc:#4ade80;--exp:#f87171}
}
body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:24px}
.top{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:20px 16px 40px}
.top h1{font-size:22px;font-weight:700}
.top .sub{font-size:12px;opacity:.7;margin-top:2px}
.top-acts{position:absolute;top:16px;right:16px}
.top-acts button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.1);color:#fff;width:34px;height:34px;border-radius:8px;font-size:15px;cursor:pointer}
.sum{display:flex;gap:8px;padding:0 12px;margin-top:-28px;position:relative}
.sum>div{flex:1;background:var(--card);border-radius:12px;padding:12px 8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.sum .lbl{font-size:9px;color:var(--text2);text-transform:uppercase;font-weight:600}
.sum .amt{font-size:16px;font-weight:800;margin-top:2px}
.sum .inc .amt{color:var(--inc)}
.sum .exp .amt{color:var(--exp)}
.sum .net .amt{color:var(--inc)}
.bar{height:4px;background:var(--border);border-radius:2px;margin:8px 12px;overflow:hidden;opacity:0}
.bar.on{opacity:1}
.bar-fill{height:100%;width:0;background:var(--inc);border-radius:2px}
.bar-lbl{text-align:center;font-size:11px;color:var(--text2);padding:0 12px 8px;display:none}
.bar-lbl.on{display:block}
#content{padding:12px}
.s-card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.s-card h2{font-size:18px;margin-bottom:4px}
.s-card p{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5}
.s-card label{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px;cursor:pointer}
.s-card input[type=checkbox]{width:18px;height:18px;accent-color:#1a73e8}
.s-card .lt{font-size:14px;font-weight:500}
.s-card .lh{font-size:11px;color:var(--text2)}
.s-card .sb{width:100%;padding:12px;background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;margin-top:14px;cursor:pointer}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:#1a73e8;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 10px}
@keyframes s{to{transform:rotate(360deg)}}
.load{text-align:center;padding:60px 0;color:var(--text2)}
.tx{background:var(--card);border-radius:12px;padding:10px 12px;margin-bottom:4px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tx .d{font-size:12px;color:var(--text);margin-bottom:2px}
.tx .m{display:flex;justify-content:space-between;align-items:center}
.tx .m .a{font-size:15px;font-weight:800}
.tx .m .a.inc{color:var(--inc)}
.tx .m .a.exp{color:var(--exp)}
.tx .m .d2{font-size:10px;color:var(--text2)}
.empty{padding:40px 0;text-align:center;color:var(--text2);font-size:13px}
.grp{padding:12px 0 4px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase}
</style>
</head>
<body>

<div class="top" style="position:relative">
  <h1>Awdit</h1>
  <div class="sub" id="sub">Setup required</div>
  <div class="top-acts">
    <button onclick="go()">↻</button>
  </div>
</div>

<div class="sum" id="sum">
  <div class="inc"><div class="lbl">Income</div><div class="amt" id="inc">ETB 0</div></div>
  <div class="exp"><div class="lbl">Expense</div><div class="amt" id="exp">ETB 0</div></div>
  <div class="net"><div class="lbl">Net</div><div class="amt" id="net">ETB 0</div></div>
</div>

<div class="bar" id="bar"><div class="bar-fill" id="bf"></div></div>
<div class="bar-lbl" id="bl">Reading...</div>

<div id="content"></div>

<script>
var all=[],fil=[],pen=[],timer;
function isC(){return !!localStorage.getItem('c')}

function setup(){
  var c=localStorage.getItem('c');
  document.getElementById('content').innerHTML=
    '<div class="s-card"><h2>Get Started</h2><p>Awdit reads Telebirr SMS to track your spending.</p>'+
    '<label><input type="checkbox" id="chk" checked><div><div class="lt">Telebirr</div><div class="lh">Shortcode 127</div></div></label>'+
    '<button class="sb" onclick="st()">Start Tracking</button></div>';
}
function st(){
  localStorage.setItem('c','1');
  document.getElementById('sub').textContent='Reading...';
  go();
}
function go(){
  if(!isC()){setup();return}
  all=[];pen=[];
  document.getElementById('content').innerHTML='<div class="load"><div class="spin"></div></div>';
  document.getElementById('sub').textContent='Refreshing...';
  Android.setFilters('telebirr,127');
  Android.refresh();
}

function parseAmt(t){
  var c=t.replace(/available\s*(?:bal|balance)[^.]*\./gi,' ').replace(/(?:bal|balance)\s*:\s*(?:ETB|Birr)?\s*[\d,.]+/gi,' ').replace(/ETB\s*0\.00/gi,' ');
  var rs=[/(?:received|credited|deposit|payment\s+from)\s+(?:of\s+)?(?:ETB|Birr)?\s*([\d,]+(?:\.\d{2})?)/i,/(?:debited|debit|paid|payment\s+of|withdrawal|withdraw|purchase|sent|airtime|transfer\s+to)\s+(?:of\s+)?(?:ETB|Birr)?\s*([\d,]+(?:\.\d{2})?)/i,/(?:ETB|Birr)\s*([\d,]+(?:\.\d{2})?)\s+(?:received|credited|debited|paid|sent|withdrawn)/i,/(?:credited|debited)\s+(?:with\s+)?(?:ETB|Birr)?\s*([\d,]+(?:\.\d{2})?)/i,/(?:Cr|Dr)\s+(?:ETB|Birr)?\s*([\d,]+(?:\.\d{2})?)/i];
  for(var i=0;i<rs.length;i++){var m=c.match(rs[i]);if(m)return parseFloat(m[1].replace(/,/g,''))}
  var f=c.match(/(?:ETB|Birr)\s*([\d,]+(?:\.\d{2})?)/i);if(f)return parseFloat(f[1].replace(/,/g,''));
  var a=c.match(/([\d,]+(?:\.\d{2})?)\s*(?:ETB|Birr)/i);return a?parseFloat(a[1].replace(/,/g,'')):0;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function parseSms(msg){
  var t=msg.body||'',dir='expense',amt=parseAmt(t),d=new Date(msg.date),now=new Date();
  if(/received|credited|deposit|from/i.test(t)||/Cr\b/i.test(t))dir='income';
  var diff=now-d,day=86400000,grp;
  if(diff<day&&d.getDate()===now.getDate())grp='Today';
  else if(diff<2*day)grp='Yesterday';
  else if(diff<7*day)grp='This Week';
  else if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear())grp='This Month';
  else grp=d.toLocaleString('default',{month:'long',year:'numeric'});
  var desc=t.replace(/Tx[nr]?[Id]\s*:?\s*\w+/gi,'').replace(/(?:ETB|Birr)\s*[\d,.]+/g,'').replace(/[\d]{6,}/g,'').replace(/\s+/g,' ').trim();
  if(desc.length>100)desc=desc.substring(0,100)+'...';
  return{amount:amt,direction:dir,description:desc||'Transaction',date:msg.date,group:grp,dateStr:d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})};
}

function readProgress(c){document.getElementById('bar').classList.add('on');document.getElementById('bl').classList.add('on');document.getElementById('bl').textContent='Read '+c+' messages...'}
function addBatch(arr,last){
  var msgs=(typeof arr==='string'?JSON.parse(arr):arr).map(parseSms).filter(function(m){return m.amount>0});
  pen=pen.concat(msgs);document.getElementById('bf').style.width=last?'100%':'60%';
}
function finalize(){
  all=pen;pen=[];all.sort(function(a,b){return b.date-a.date});
  document.getElementById('bar').classList.remove('on');document.getElementById('bl').classList.remove('on');
  document.getElementById('sub').textContent=all.length+' transactions';
  render();
}
function render(){
  var inc=0,exp=0;
  all.forEach(function(t){if(t.direction==='income')inc+=t.amount;else exp+=t.amount});
  document.getElementById('inc').textContent='ETB '+inc.toFixed(2);
  document.getElementById('exp').textContent='ETB '+exp.toFixed(2);
  document.getElementById('net').textContent='ETB '+(inc-exp).toFixed(2);
  if(!all.length){document.getElementById('content').innerHTML='<div class="load">No transactions found</div>';return}
  var groups={},order=['Today','Yesterday','This Week','This Month'];
  all.forEach(function(t){if(!groups[t.group])groups[t.group]=[];groups[t.group].push(t)});
  var keys=Object.keys(groups).sort(function(a,b){var ia=order.indexOf(a),ib=order.indexOf(b);if(ia>=0&&ib>=0)return ia-ib;if(ia>=0)return -1;if(ib>=0)return 1;return new Date(b).getTime()-new Date(a).getTime()||0});
  var html='';
  keys.forEach(function(g){
    html+='<div class="grp">'+g+'</div>';
    groups[g].forEach(function(t){
      html+='<div class="tx"><div class="d">'+esc(t.description)+'</div><div class="m"><div class="a '+(t.direction)+(t.direction==='income'?'">+':'">-')+'ETB '+t.amount.toFixed(2)+'</div><div class="d2">'+t.dateStr+'</div></div></div>';
    });
  });
  document.getElementById('content').innerHTML=html;
}

function pageReady(){if(isC())go();else setup()}
function smsGranted(){if(isC())go();else setup()}
function smsDenied(){document.getElementById('content').innerHTML='<div class="load">SMS permission required</div>'}
function showError(m){document.getElementById('content').innerHTML='<div class="load" style="color:var(--exp)">'+esc(m)+'</div>'}

window.pageReady=pageReady;window.smsGranted=smsGranted;window.smsDenied=smsDenied;
window.readProgress=readProgress;window.addBatch=addBatch;window.finalize=finalize;window.showError=showError;
</script>
</body>
</html>
