<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" id="tc" content="#f5f3ef">
<title>Awdit</title>
<style>
@font-face{font-family:'Work Sans';font-style:normal;font-weight:400 700;font-display:swap;src:url(fonts/WorkSans.woff2)format('woff2')}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f3ef;--glass:rgba(255,255,255,.72);--glass-border:rgba(255,255,255,.3);
  --glass-shadow:0 8px 32px rgba(0,0,0,.06);--ink:#333;--body:#555;--mute:#888;--gold:#d4a843;
  --gold-light:#e8c97a;--gold-dark:#b8922e;--inc:#2e7d32;--exp:#c62828;--accent:#d4a843;
  --tag-bg:rgba(51,51,51,.06);--font:'SF Pro Display','Work Sans',-apple-system,sans-serif;
  --mono:'SF Mono',SFMono-Regular,Menlo,Monaco,Consolas,monospace;
}
@media(prefers-color-scheme:dark){
:root{
  --bg:#1a1a1a;--glass:rgba(30,30,30,.78);--glass-border:rgba(255,255,255,.08);
  --glass-shadow:0 8px 32px rgba(0,0,0,.3);--ink:#e8e8e8;--body:#aaa;--mute:#777;
  --tag-bg:rgba(255,255,255,.06);
}
}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;min-height:100vh;padding-bottom:32px;line-height:1.5}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(212,168,67,.04) 0,transparent 50%),radial-gradient(circle at 70% 80%,rgba(212,168,67,.03) 0,transparent 50%);pointer-events:none;z-index:0}

/* header — glass */
.hdr{position:sticky;top:0;z-index:10;background:var(--glass);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border);padding:12px 16px 12px}
.hdr-inner{display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:-.3px}
.hdr-acts{display:flex;gap:4px}
.hdr-acts button{background:var(--glass);border:1px solid var(--glass-border);color:var(--ink);width:32px;height:32px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1),background .15s}
.hdr-acts button:active{transform:scale(.88);background:var(--gold);color:#fff}
.hdr .sub{font-size:11px;color:var(--mute);margin-top:1px}

/* summary — glass cards */
.sums{display:flex;gap:8px;padding:0 12px;margin-top:-8px;position:relative;z-index:2}
.sums>div{flex:1;background:var(--glass);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:12px;padding:12px 4px;text-align:center;box-shadow:var(--glass-shadow)}
.sums .sl{font-size:9px;color:var(--mute);text-transform:uppercase;font-weight:600;letter-spacing:.8px}
.sums .sv{font-size:18px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.sums .inc .sv{color:var(--inc)}
.sums .exp .sv{color:var(--exp)}
.sums .net .sv{color:var(--gold)}

/* progress */
.prog{height:2px;background:var(--glass-border);margin:4px 12px 0;border-radius:2px;opacity:0;transition:opacity .2s;overflow:hidden}
.prog.on{opacity:1}
.prog-f{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px;transition:width .3s}
.prog-l{text-align:center;font-size:10px;color:var(--mute);padding:2px 12px 0;display:none}
.prog-l.on{display:block}

#ct{padding:0 12px;position:relative;z-index:1}

/* glass card base */
.glass{background:var(--glass);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:12px;box-shadow:var(--glass-shadow)}
.pad{padding:16px}
.pad-sm{padding:10px 12px}

/* setup */
.sc{margin:16px 0}
.sc h2{font-size:17px;font-weight:700;margin-bottom:4px}
.sc p{font-size:13px;color:var(--body);margin-bottom:14px}
.sc label{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;margin-bottom:4px;cursor:pointer;transition:border-color .15s}
.sc label:has(input:checked){border-color:var(--gold)}
.sc input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold)}
.sc .lt{font-size:14px;font-weight:600}
.sc .lh{font-size:11px;color:var(--mute)}
.sc .el{display:block;margin:12px 0 4px;font-size:11px;color:var(--mute);font-weight:500}
.sc .ei{width:100%;padding:10px 12px;border:1px solid var(--glass-border);border-radius:10px;font-size:13px;outline:none;background:var(--glass);color:var(--ink);font-family:var(--mono);transition:border-color .15s}
.sc .ei:focus{border-color:var(--gold)}
.sc .sb{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1),opacity .15s}
.sc .sb:active{transform:scale(.97);opacity:.9}

.spin{width:22px;height:22px;border:2px solid var(--glass-border);border-top-color:var(--gold);border-radius:50%;animation:s .6s linear infinite;margin:0 auto 6px}
@keyframes s{to{transform:rotate(360deg)}}
.ld{text-align:center;padding:48px 0;color:var(--mute);font-size:12px}

/* filter row */
.fr{display:flex;gap:6px;padding:6px 0 4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.fr::-webkit-scrollbar{display:none}
.fi{padding:5px 12px;border-radius:8px;background:var(--glass);border:1px solid var(--glass-border);font-size:11px;cursor:pointer;white-space:nowrap;font-weight:600;color:var(--mute);flex-shrink:0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.fi.act{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:0 2px 12px rgba(212,168,67,.25)}

.sr{width:100%;padding:9px 12px;border:1px solid var(--glass-border);border-radius:10px;font-size:12px;outline:none;background:var(--glass);color:var(--ink);margin:2px 0 6px;font-family:var(--mono);transition:border-color .15s}
.sr:focus{border-color:var(--gold)}

/* bank stats */
.bs{display:flex;gap:6px;padding:0 0 6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.bs::-webkit-scrollbar{display:none}
.bc{flex:1;min-width:90px;padding:8px 10px}
.bc .bl{font-size:9px;color:var(--mute);text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.bc .bv{font-size:12px;font-weight:700;margin-top:2px}
.bc .bv.g{color:var(--inc)}
.bc .bv.r{color:var(--exp)}

/* viz row */
.vr{display:flex;gap:8px;margin:0 0 8px}
.vc{flex:1;padding:12px}
.vc h3{font-size:9px;color:var(--mute);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.ch{display:flex;align-items:flex-end;height:46px;gap:2px;padding-top:4px}
.cc{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:1px}
.cb{border-radius:2px 2px 0 0;min-height:1px;transition:height .6s cubic-bezier(.34,1.56,.64,1)}
.cb.inc{background:var(--inc)}
.cb.exp{background:var(--exp)}

.dw{width:72px;height:72px;border-radius:50%;margin:2px auto 0;position:relative}
.di{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--mute);flex-direction:column;gap:1px}
.di .dl{font-size:9px;font-weight:500;color:var(--mute)}
.di .dv{font-family:var(--mono)}

.ins{padding:8px 12px;margin:0 0 6px;display:flex;align-items:center;gap:8px}
.ins .ii{font-size:12px;flex-shrink:0;font-family:var(--mono);color:var(--gold);font-weight:700}
.ins .it{font-size:11px;color:var(--body);line-height:1.4}
.ins .it b{color:var(--ink);font-weight:600}

/* balance */
.bx{padding:10px 12px;margin:0 0 6px}
.bx h3{font-size:9px;color:var(--mute);text-transform:uppercase;font-weight:700;letter-spacing:.6px;margin-bottom:6px}
.br{display:flex;gap:8px;overflow-x:auto}
.br .be{flex:1;min-width:76px}
.br .be .bn{font-size:10px;font-weight:600;color:var(--mute)}
.br .be .bv{font-size:13px;font-weight:800;color:var(--ink)}

.gl{padding:10px 0 4px;font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;font-family:var(--mono)}
.tx{background:var(--glass);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid var(--glass-border);border-radius:10px;padding:10px 12px;margin-bottom:4px;display:flex;align-items:flex-start;gap:8px;box-shadow:var(--glass-shadow);animation:fadeUp .35s ease both}
.tx .ti{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:700;font-family:var(--mono)}
.tx .ti.e{background:rgba(198,40,40,.1);color:var(--exp)}
.tx .ti.i{background:rgba(46,125,50,.1);color:var(--inc)}
.tx .tb{flex:1;min-width:0}
.tx .tr{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.tx .tba{font-size:8px;color:var(--mute);background:var(--tag-bg);padding:1px 5px;border-radius:4px;font-weight:600}
.tx .tca{font-size:7px;color:#fff;padding:1px 5px;border-radius:3px;font-weight:700}
.tx .tca.tr{background:#e65100}
.tx .tca.pm{background:#1565c0}
.tx .tca.at{background:#6a1b9a}
.tx .tca.wd{background:#c62828}
.tx .tca.dp{background:#2e7d32}
.tx .tca.sl{background:#00695c}
.tx .td{font-size:12px;color:var(--ink);margin-top:1px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.tx .td2{font-size:8px;color:var(--mute);margin-top:1px;font-family:var(--mono)}
.tx .ta{font-size:14px;font-weight:800;text-align:right;flex-shrink:0;min-width:66px;letter-spacing:-.2px;font-family:var(--mono)}
.tx .ta.i{color:var(--inc)}
.tx .ta.e{color:var(--exp)}
.em{padding:36px 0;text-align:center;color:var(--mute);font-size:12px}

/* animations */
.bc{animation:fadeUp .3s ease both}
.vc{animation:fadeUp .4s ease both}
.ins{animation:fadeUp .3s ease both}
.bx{animation:fadeUp .35s ease both}
.sums>div{animation:fadeUp .45s ease both}
.shim{background:linear-gradient(90deg,var(--glass) 0,rgba(212,168,67,.1) 40%,var(--glass) 80%);background-size:200% 100%;animation:shimmer 1.2s ease infinite;border-radius:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.ov{position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.3);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding:32px 12px;overflow-y:auto;animation:fadeUp .2s ease both}
.ov .sc{width:100%;max-width:360px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <h1>✦ Awdit</h1>
    <div class="hdr-acts">
      <button onclick="toggleTheme()"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <button onclick="settings()"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></button>
      <button onclick="go()"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0114.4-3.9L23 10M1 14l5.1 4.9A9 9 0 0020.5 15"/></svg></button>
      <button onclick="share()"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
    </div>
  </div>
  <div class="sub" id="sub">setup required</div>
</div>

<div class="sums">
  <div class="inc"><div class="sl">Income</div><div class="sv" id="inc">ETB 0</div></div>
  <div class="exp"><div class="sl">Expense</div><div class="sv" id="exp">ETB 0</div></div>
  <div class="net"><div class="sl">Net</div><div class="sv" id="net">ETB 0</div></div>
</div>

<div class="prog" id="bar"><div class="prog-f" id="bf"></div></div>
<div class="prog-l" id="bl">reading...</div>

<div id="ct"></div>

<script>
var all=[],pen=[],activeB='all',activeT='all',bal={};
var C='(?:ETB|Birr|Br\\.?)';
function cur(){return localStorage.getItem('cu')||'ETB'}

function isC(){return !!localStorage.getItem('c')}
function gf(){
  var b=JSON.parse(localStorage.getItem('b')||'["telebirr","cbe","dashen"]');
  var c=(localStorage.getItem('x')||'127').split(',').map(function(s){return s.trim()}).filter(Boolean);
  return b.concat(c).join(',');
}

function setup(){
  var b=JSON.parse(localStorage.getItem('b')||'["telebirr","cbe","dashen"]');
  var c=localStorage.getItem('x')||'127';
  document.getElementById('ct').innerHTML=
    '<div class="sc glass pad"><h2>Get Started</h2><p>Select the banks you use to track spending.</p><div id="bc">'+
    [{i:'telebirr',l:'Telebirr',h:'Shortcode 127'},{i:'cbe',l:'CBE Birr',h:'Commercial Bank of Ethiopia'},{i:'dashen',l:'Dashen Bank',h:'Dashen Bank S.C.'}]
    .map(function(b2){return '<label><input type="checkbox" value="'+b2.i+'"'+(b.indexOf(b2.i)>=0?' checked':'')+'><div><div class="lt">'+b2.l+'</div><div class="lh">'+b2.h+'</div></div></label>'}).join('')+
    '</div><label class="el">Extra sender numbers</label><input type="text" class="ei" id="cs" value="'+c+'" placeholder="e.g. 127, 8484">'+
    '<button class="sb" onclick="st()">Start Tracking</button></div>';
}
function st(){
  var cks=[];document.querySelectorAll('#bc input:checked').forEach(function(e){cks.push(e.value)});
  var cs=document.getElementById('cs').value.trim();
  if(!cks.length&&!cs)return;
  localStorage.setItem('b',JSON.stringify(cks));localStorage.setItem('x',cs);localStorage.setItem('c','1');
  document.getElementById('sub').textContent='reading...';go();
}
function go(){
  if(!isC()){setup();return}
  all=[];pen=[];bal={};
  document.getElementById('ct').innerHTML='<div class="ld"><div class="spin"></div>loading...</div><div style="padding:0 2px">'+'<div class="shim" style="height:46px;margin-bottom:6px"></div>'.repeat(4)+'<div class="shim" style="height:62px;margin-bottom:4px"></div>'.repeat(3)+'</div>';
  document.getElementById('sub').textContent='refreshing...';
  try{Android.setFilters(gf());Android.refresh()}catch(e){}
}

function cleanAmt(s){
  if(s==null)return 0;
  s=s.replace(/\s/g,'');
  if(/\.\d{2}$/.test(s))return parseFloat(s.replace(/,/g,''));
  var m=s.match(/^([\d,.]+),(\d{2})$/);
  if(m)return parseFloat(m[1].replace(/,/g,'')+'.'+m[2]);
  return parseFloat(s.replace(/,/g,''));
}
function parseAmt(t){
  var bl=new RegExp('^(?:your\\s+)?(?:current\\s+)?(?:eMoney|emoney|balance|bal)\\s*(?::|is)?\\s*'+C+'\\s*[\\d,]+(?:\\.\\d{2})?\\.?\\s*$','i');
  if(bl.test(t.trim()))return null;
  var balR=new RegExp('(?:current|available)\\s*(?:eMoney|emoney|bal|balance)\\s*(?::|is\\s+)?'+C+'\\s*[\\d,]+(?:\\.\\d{2})?\\s*\\.?','gi');
  var balR2=new RegExp('(?:bal|balance)\\s*:\\s*'+C+'?\\s*[\\d,.]+','gi');
  var c=t.replace(balR,' ').replace(balR2,' ').replace(/ETB\s*0\.00/gi,' ').replace(/Tx[nr]?[Id]\s*:?\s*\w+/gi,' ');
  var incR=new RegExp('(?:received|credited|deposit|payment\\s+from)\\s+(?:of\\s+)?'+C+'?\\s*([\\d,]+(?:\\.\\d{2})?)','i');
  var expR=new RegExp('(?:debited|debit|paid|payment\\s+of|withdrawal|withdraw|purchase|sent|airtime|transfer\\s+to|bought)\\s+(?:of\\s+)?'+C+'?\\s*([\\d,]+(?:\\.\\d{2})?)','i');
  for(var i=0;i<5;i++){
    var r=[incR,expR,new RegExp(C+'\\s*([\\d,]+(?:\\.\\d{2})?)\\s+(?:received|credited|debited|paid|sent|withdrawn)','i'),new RegExp('(?:credited|debited)\\s+(?:with\\s+)?'+C+'?\\s*([\\d,]+(?:\\.\\d{2})?)','i'),new RegExp('(?:Cr|Dr)\\s+'+C+'?\\s*([\\d,]+(?:\\.\\d{2})?)','i')][i];
    var m=c.match(r);if(m)return{amt:cleanAmt(m[1]),hasTx:true}
  }
  var f=c.match(new RegExp(C+'\\s*([\\d,]+(?:\\.\\d{2})?)','i'));
  if(f){var n=cleanAmt(f[1]);if(n>0)return{amt:n,hasTx:false}}
  var a=c.match(new RegExp('([\\d,]+(?:\\.\\d{2})?)\\s*'+C,'i'));
  if(a){var n2=cleanAmt(a[1]);if(n2>0)return{amt:n2,hasTx:false}}
  return null;
}
function detectCat(t){
  var l=t.toLowerCase();
  if(/airtime|recharge/i.test(l))return'at';
  if(/withdraw|withdrawal|cash\s*(?:out|back)/i.test(l))return'wd';
  if(/salary|payroll/i.test(l))return'sl';
  if(/deposit/i.test(l))return'dp';
  if(/transfer|sent\s+to|transferred/i.test(l))return'tr';
  if(/payment\s+(?:of|to|for)|purchase|paid\s+to|bought|merchant/i.test(l))return'pm';
  if(/received|credited|from\s+\w+/i.test(l))return'dp';
  return'tr';
}
var catL={at:'Airtime',wd:'Withdrawal',sl:'Salary',dp:'Deposit',tr:'Transfer',pm:'Payment'};
var catS={at:'[A]',wd:'[W]',sl:'[S]',dp:'[D]',tr:'[T]',pm:'[P]'};
var catC={at:'#6a1b9a',wd:'#c62828',sl:'#00695c',dp:'#2e7d32',tr:'#e65100',pm:'#1565c0'};
function bl(b){return{telebirr:'Telebirr',cbe:'CBE',dashen:'Dashen'}[b]||b}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function extractBal(t,bank){
  var r1=t.match(/(?:current|available)\s*(?:eMoney|emoney|bal|balance)\s*(?::|is\s+)?(?:ETB|Birr|Br\.?)\s*([\d,]+(?:\.[\d]{2})?)/i);
  if(r1){bal[bank]={amt:cleanAmt(r1[1]),date:Date.now()};return}
  var r2=t.match(/(?:bal|balance)\s*:\s*(?:ETB|Birr|Br\.?)?\s*([\d,.]+)/i);
  if(r2){bal[bank]={amt:cleanAmt(r2[1]),date:Date.now()};return}
  var r3=t.match(/(?:current|available)\s*(?:eMoney|emoney|bal|balance)\s*(?::|is\s+)?([\d,]+(?:\.[\d]{2})?)\s*(?:ETB|Birr|Br\.?)/i);
  if(r3){bal[bank]={amt:cleanAmt(r3[1]),date:Date.now()}}
}

function parseSms(msg){
  try{
    var t=msg.body||'',bank=msg.bank||'other';
    extractBal(t,bank);
    if(/airtime|recharge|points?\b/i.test(t))return null;
    var p=parseAmt(t);
    if(!p||!p.amt||p.amt===0)return null;
    if(p.hasTx===false)return null;
    var dir=/received|credited|deposit|payment\s+from/i.test(t)||/Cr\b/i.test(t)?'income':'expense';
    var d=new Date(msg.date),now=new Date(),diff=now-d,day=86400000,grp;
    if(diff<day&&d.getDate()===now.getDate())grp='Today';
    else if(diff<2*day)grp='Yesterday';
    else if(diff<7*day)grp='This Week';
    else if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear())grp='This Month';
    else grp=d.toLocaleString('default',{month:'long',year:'numeric'});
    var desc=t.replace(/Tx[nr]?[Id]\s*:?\s*\w+/gi,'').replace(new RegExp(C+'\\s*[\\d,.]+','gi'),'').replace(/[\d]{6,}/g,'').replace(/\s+/g,' ').trim();
    if(desc.length>100)desc=desc.substring(0,100)+'...';
    return{amount:p.amt,direction:dir,category:detectCat(t),bank:bank,description:desc||'Transaction',address:msg.address,date:msg.date,group:grp,dateStr:d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),weekStart:new Date(d.getFullYear(),d.getMonth(),d.getDate()-d.getDay()).getTime(),raw:t.substring(0,80)};
  }catch(e){return null}
}

function readProgress(c){
  document.getElementById('bar').classList.add('on');
  document.getElementById('bl').classList.add('on');
  document.getElementById('bl').textContent='read '+c+' messages...';
}
function addBatch(arr,last){
  try{
    var msgs=(typeof arr==='string'?JSON.parse(arr):arr).map(parseSms).filter(function(m){return m&&m.amount>0});
    pen=pen.concat(msgs);
  }catch(e){}
  document.getElementById('bf').style.width=last?'100%':'60%';
}
function finalize(){
  all=pen;pen=[];all.sort(function(a,b){return b.date-a.date});
  document.getElementById('bar').classList.remove('on');document.getElementById('bl').classList.remove('on');
  document.getElementById('sub').textContent=all.length+' transactions';render();
}

function render(){renderF();applyF()}
function renderF(){
  var tr=['7d','30d','90d','all'].map(function(k){return'<span class="fi'+(activeT===k?' act':'')+'" onclick="setT(\''+k+'\')">'+k+'</span>'}).join('');
  document.getElementById('ct').innerHTML=
    '<div class="fr" id="tr">'+tr+'</div><div class="fr" id="br"></div>'+
    '<input class="sr" id="sr" placeholder="search..." oninput="debF()">'+
    '<div class="bs" id="st"></div>'+
    '<div class="vr"><div class="vc glass"><h3>Weekly</h3><div class="ch" id="ch"></div></div><div class="vc glass"><h3>Categories</h3><div class="dw" id="dw"><div class="di"><span class="dl">cats</span><span class="dv" id="dn">0</span></div></div></div></div>'+
    '<div id="ins"></div><div id="bls"></div><div id="lst"><div class="ld"><div class="spin"></div></div></div>';
  var bks={};all.forEach(function(t){bks[t.bank]=1});
  var h='<span class="fi'+(activeB==='all'?' act':'')+'" onclick="setB(\'all\')">All ('+all.length+')</span>';
  for(var b in bks)h+='<span class="fi'+(activeB===b?' act':'')+'" onclick="setB(\''+b+'\')">'+bl(b)+' ('+all.filter(function(t){return t.bank===b}).length+')</span>';
  document.getElementById('br').innerHTML=h;
}
function setB(b){activeB=b;renderB();applyF()}
function setT(t){activeT=t;renderF();applyF()}
function renderB(){
  var bks={};all.forEach(function(t){bks[t.bank]=1});
  var h='<span class="fi'+(activeB==='all'?' act':'')+'" onclick="setB(\'all\')">All ('+all.length+')</span>';
  for(var b in bks)h+='<span class="fi'+(activeB===b?' act':'')+'" onclick="setB(\''+b+'\')">'+bl(b)+' ('+all.filter(function(t){return t.bank===b}).length+')</span>';
  document.getElementById('br').innerHTML=h;
}

function debF(){clearTimeout(window._ft);window._ft=setTimeout(applyF,200)}
function now(){return Date.now()}
function tF(d){return activeT==='all'||now()-d<{'7d':604800000,'30d':2592000000,'90d':7776000000}[activeT]}

function applyF(){
  var q=(document.getElementById('sr')||{value:''}).value.toLowerCase();
  var fl=all.filter(function(t){
    if(!tF(t.date))return false;
    if(activeB!=='all'&&t.bank!==activeB)return false;
    if(q&&![t.description,t.address,t.raw].some(function(s){return s&&s.toLowerCase().indexOf(q)>=0}))return false;
    return true;
  });
  renderSum(fl);renderStats(fl);renderChart(fl);renderDonut(fl);renderInsight(fl);renderBal();renderList(fl);
}

function renderSum(fl){
  var inc=0,exp=0;fl.forEach(function(t){if(t.direction==='income')inc+=t.amount;else exp+=t.amount});
  ani('inc',inc);ani('exp',exp);ani('net',inc-exp);
}
function ani(id,target){
  var el=document.getElementById(id);if(!el)return;
  var start=parseFloat(el.dataset.v||'0'),dur=500,st=performance.now();
  if(Math.abs(target-start)<.01){el.textContent=cur()+' '+target.toFixed(2);el.dataset.v=target;return}
  function step(ts){
    var p=Math.min((ts-st)/dur,1),e=1-Math.pow(1-p,3);
    el.textContent=cur()+' '+(start+(target-start)*e).toFixed(2);
    if(p<1)requestAnimationFrame(step);else el.dataset.v=target;
  }
  el.dataset.v=start;requestAnimationFrame(step);
}

function renderStats(fl){
  var bks={};fl.forEach(function(t){if(!bks[t.bank])bks[t.bank]={i:0,e:0};if(t.direction==='income')bks[t.bank].i+=t.amount;else bks[t.bank].e+=t.amount});
  var h='';
  for(var b in bks)h+='<div class="bc glass pad-sm"><div class="bl">'+bl(b)+'</div><div class="bv g">+'+cur()+' '+bks[b].i.toFixed(2)+'</div><div class="bv r">-'+cur()+' '+bks[b].e.toFixed(2)+'</div></div>';
  document.getElementById('st').innerHTML=h;
}

function renderChart(fl){
  var ws={};fl.forEach(function(t){
    if(!ws[t.weekStart])ws[t.weekStart]={i:0,e:0};
    if(t.direction==='income')ws[t.weekStart].i+=t.amount;else ws[t.weekStart].e+=t.amount;
  });
  var sorted=Object.entries(ws).sort(function(a,b){return a[0]-b[0]}).slice(-12);
  var max=Math.max.apply(null,sorted.map(function(v){return Math.max(v[1].i,v[1].e)}))||1;
  document.getElementById('ch').innerHTML=sorted.map(function(v){
    return '<div class="cc"><div class="cb exp" style="height:'+(v[1].e/max*100)+'%"></div><div class="cb inc" style="height:'+(v[1].i/max*100)+'%"></div></div>';
  }).join('');
}

function renderDonut(fl){
  var cats={};fl.forEach(function(t){if(!cats[t.category])cats[t.category]=0;cats[t.category]+=t.amount});
  var entries=Object.entries(cats),total=entries.reduce(function(s,v){return s+v[1]},0);
  document.getElementById('dn').textContent=entries.length;
  if(!total){document.getElementById('dw').style.background='';return}
  var segs=[],acc=0;var pal=['#1565c0','#e65100','#2e7d32','#c62828','#6a1b9a','#00695c'];
  entries.forEach(function(v,i){
    var p=v[1]/total*100,c=catC[v[0]]||pal[i%pal.length];
    segs.push(c+' '+acc.toFixed(1)+'% '+(acc+p).toFixed(1)+'%');
    acc+=p;
  });
  document.getElementById('dw').style.background='conic-gradient('+segs.join(',')+')';
}

function renderInsight(fl){
  if(!fl.length){document.getElementById('ins').innerHTML='';return}
  var cats={};fl.forEach(function(t){if(!cats[t.category])cats[t.category]={c:0,a:0};cats[t.category].c++;cats[t.category].a+=t.amount});
  var topCat=null,topAmt=0;
  for(var c in cats){if(cats[c].a>topAmt){topCat=c;topAmt=cats[c].a}}
  var maxT=null,maxA=0;
  fl.forEach(function(t){if(t.amount>maxA){maxA=t.amount;maxT=t}});
  var h='';
  if(topCat&&topAmt>0)h+='<div class="ins glass"><span class="ii">◆</span><div class="it">Most spent on: <b>'+catL[topCat]+'</b> ('+cur()+' '+topAmt.toFixed(2)+')</div></div>';
  if(maxT)h+='<div class="ins glass"><span class="ii">◆</span><div class="it">Largest: <b>'+esc(maxT.description)+'</b> ('+cur()+' '+maxA.toFixed(2)+')</div></div>';
  document.getElementById('ins').innerHTML=h;
}

function renderBal(){
  var h='';
  for(var b in bal){
    if(bal[b]&&bal[b].amt>0){
      h+='<div class="be"><div class="bn">'+bl(b)+'</div><div class="bv">'+cur()+' '+bal[b].amt.toFixed(2)+'</div></div>';
    }
  }
  document.getElementById('bls').innerHTML=h?'<div class="bx glass"><h3>Balance</h3><div class="br">'+h+'</div></div>':'';
}

function renderList(fl){
  if(!fl.length){document.getElementById('lst').innerHTML='<div class="em">no transactions</div>';return}
  var groups={},order=['Today','Yesterday','This Week','This Month'];
  fl.forEach(function(t){if(!groups[t.group])groups[t.group]=[];groups[t.group].push(t)});
  var keys=Object.keys(groups).sort(function(a,b){
    var ia=order.indexOf(a),ib=order.indexOf(b);
    if(ia>=0&&ib>=0)return ia-ib;if(ia>=0)return -1;if(ib>=0)return 1;
    return new Date(b).getTime()-new Date(a).getTime()||0;
  });
  var h='',idx=0;
  keys.forEach(function(g){
    h+='<div class="gl">'+g+'</div>';
    groups[g].forEach(function(t){
      var ic=t.direction==='income'?'+':'-',cc=t.direction==='income'?'i':'e';
      h+='<div class="tx" style="animation-delay:'+(idx*25)+'ms"><div class="ti '+cc+'">'+ic+'</div><div class="tb">'+
        '<div class="tr"><span class="tba">'+bl(t.bank)+'</span><span class="tca '+t.category+'">'+catS[t.category]+'</span></div>'+
        '<div class="td">'+esc(t.description)+'</div><div class="td2">'+t.dateStr+'</div></div>'+
        '<div class="ta '+cc+'">'+(t.direction==='income'?'+':'-')+cur()+' '+t.amount.toFixed(2)+'</div></div>';
      idx++;
    });
  });
  document.getElementById('lst').innerHTML=h;
}

function share(){
  var fl=[],inc=0,exp=0;
  all.forEach(function(t){fl.push(t);if(t.direction==='income')inc+=t.amount;else exp+=t.amount});
  var c=cur();var txt='Awdit Report\n'+new Date().toLocaleDateString()+'\n'+'─'.repeat(30)+'\nIncome: '+c+' '+inc.toFixed(2)+'\nExpense: '+c+' '+exp.toFixed(2)+'\nNet: '+c+' '+(inc-exp).toFixed(2)+'\n'+'─'.repeat(30)+'\n\n'+fl.map(function(t){return(t.direction==='income'?'+':'-')+c+' '+t.amount.toFixed(2)+' | '+t.category+' | '+t.dateStr}).join('\n');
  var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.left='-999px';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy')}catch(e){}
  document.body.removeChild(ta);
  document.getElementById('sub').textContent='copied!';
  setTimeout(function(){document.getElementById('sub').textContent=all.length+' transactions'},1500);
}

function toggleTheme(){
  var o=document.getElementById('to');
  if(o)o.remove();
  else{
    var s=document.createElement('style');s.id='to';
    var dm=window.matchMedia('(prefers-color-scheme:dark)').matches;
    var dark='--bg:#1a1a1a;--glass:rgba(30,30,30,.78);--glass-border:rgba(255,255,255,.08);--glass-shadow:0 8px 32px rgba(0,0,0,.3);--ink:#e8e8e8;--body:#aaa;--mute:#777;--tag-bg:rgba(255,255,255,.06)';
    var light='--bg:#f5f3ef;--glass:rgba(255,255,255,.72);--glass-border:rgba(255,255,255,.3);--glass-shadow:0 8px 32px rgba(0,0,0,.06);--ink:#333;--body:#555;--mute:#888;--tag-bg:rgba(51,51,51,.06)';
    s.textContent=':root{'+(dm?light:dark)+'}';
    document.head.appendChild(s);
    try{Android.statusBarColor(dm?'#f5f3ef':'#1a1a1a')}catch(e){};
  }
}

function closeSettings(){var o=document.getElementById('ov');if(o)o.remove()}
function settings(){
  var b=JSON.parse(localStorage.getItem('b')||'["telebirr","cbe","dashen"]');
  var c=localStorage.getItem('x')||'127';
  var d=document.createElement('div');d.id='ov';d.className='ov';
  d.innerHTML='<div class="sc glass pad"><div style="display:flex;justify-content:space-between;align-items:center"><h2>Settings</h2><button onclick="closeSettings()" style="background:none;border:none;color:var(--mute);font-size:18px;cursor:pointer">✕</button></div><p>Manage banks and senders.</p><div id="bc2">'+
    [{i:'telebirr',l:'Telebirr',h:'Shortcode 127'},{i:'cbe',l:'CBE Birr',h:'Commercial Bank of Ethiopia'},{i:'dashen',l:'Dashen Bank',h:'Dashen Bank S.C.'}]
    .map(function(b2){return '<label><input type="checkbox" value="'+b2.i+'"'+(b.indexOf(b2.i)>=0?' checked':'')+'><div><div class="lt">'+b2.l+'</div><div class="lh">'+b2.h+'</div></div></label>'}).join('')+
    '</div><label class="el">Extra sender numbers</label><input type="text" class="ei" id="cs2" value="'+c+'">'+
    '<label class="el" style="margin-top:10px">Currency</label><input type="text" class="ei" id="cu" value="'+(localStorage.getItem('cu')||'ETB')+'">'+
    '<button class="sb" onclick="saveSettings()" style="margin-top:14px">Save</button></div>';
  document.body.appendChild(d);
}
function saveSettings(){
  var cks=[];document.querySelectorAll('#bc2 input:checked').forEach(function(e){cks.push(e.value)});
  var cs=document.getElementById('cs2').value.trim();
  var cu=document.getElementById('cu').value.trim()||'ETB';
  localStorage.setItem('b',JSON.stringify(cks));localStorage.setItem('x',cs||'127');localStorage.setItem('cu',cu);
  closeSettings();
  if(localStorage.getItem('c'))go();
}
function pageReady(){try{Android.statusBarColor(window.matchMedia('(prefers-color-scheme:dark)').matches?'#1a1a1a':'#f5f3ef')}catch(e){};if(isC())go();else setup()}
function smsGranted(){try{Android.statusBarColor(window.matchMedia('(prefers-color-scheme:dark)').matches?'#1a1a1a':'#f5f3ef')}catch(e){};if(isC())go();else setup()}
function smsDenied(){document.getElementById('ct').innerHTML='<div class="em">SMS permission required</div>'}
function showError(m){document.getElementById('ct').innerHTML='<div class="em" style="color:var(--exp)">'+esc(m)+'</div>'}

window.pageReady=pageReady;window.smsGranted=smsGranted;window.smsDenied=smsDenied;
window.readProgress=readProgress;window.addBatch=addBatch;window.finalize=finalize;window.showError=showError;
</script>
</body>
</html>
